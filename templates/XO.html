<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOMIVERSE - Крестики-нолики 9x9</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div id="fileOpenWarn" style="display:none;background:#2a1a3d;color:#eee;padding:16px 20px;font-family:system-ui,sans-serif;font-size:15px;line-height:1.5;border-bottom:3px solid #764ba2;">
        <strong>Открыт файл с диска</strong> — игра не работает. Запустите <code style="background:#0003;padding:2px 6px;border-radius:4px;">python app.py</code>
        и зайдите в игру с лобби: <a href="http://localhost:5000" style="color:#a78bfa;">localhost:5000</a>.
    </div>
    <script>
        (function () {
            if (location.protocol === 'file:') {
                var w = document.getElementById('fileOpenWarn');
                if (w) w.style.display = 'block';
                document.addEventListener('DOMContentLoaded', function () {
                    var c = document.querySelector('.container');
                    if (c) c.style.display = 'none';
                });
            }
        })();
    </script>

    <!-- Линия сверху (на всю ширину страницы) -->
    <div class="top-line"></div>

    <div class="container">
        <!-- Шапка с линиями на всю ширину как в лобби -->
        <div style="width: 100%; margin-bottom: 20px;">
            <div class="header-with-lines" style="width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1 class="logo" style="margin: 0;">ROOMIVERSE</h1>
                    <a href="/lobby?code={{ room_code }}" class="back-to-lobby" 
                       style="color: #667eea; text-decoration: none; padding: 10px 20px; 
                              background: rgba(102, 126, 234, 0.2); border-radius: 10px;">
                        ← В лобби
                    </a>
                </div>
            </div>
        </div>

        <!-- Статус игроков (как в лобби) -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 30px; margin: 30px 0;">
            <div class="player-card" id="playerXCard" style="min-width: 150px;">
                <div class="player-avatar" style="background: #ff6b6b;">X</div>
                <div>
                    <div class="player-name" id="playerXName">Загрузка...</div>
                    <div style="color: #ff6b6b;" id="playerXStatus">⚡ ходит</div>
                </div>
            </div>
            
            <div style="font-size: 24px; color: #667eea; font-weight: bold;">VS</div>
            
            <div class="player-card" id="playerOCard" style="min-width: 150px;">
                <div class="player-avatar" style="background: #4ecdc4;">O</div>
                <div>
                    <div class="player-name" id="playerOName">Загрузка...</div>
                    <div style="color: #4ecdc4;" id="playerOStatus">⏳ ждет</div>
                </div>
            </div>
        </div>

        <!-- Статистика игры -->
        <div style="display: flex; justify-content: space-between; margin: 20px 0; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px;">
            <span style="color: #667eea;" id="turnIndicator">Ход: X</span>
            <span style="color: #764ba2;" id="movesCounter">0 ходов</span>
        </div>

        <!-- ИГРОВОЕ ПОЛЕ по центру -->
        <div style="display: flex; justify-content: center; margin: 20px 0;">
            <div class="game-board" id="gameBoard"></div>
        </div>

        <!-- Новая игра сразу под полем (ТЗ / UX) -->
        <div style="display: flex; justify-content: center; margin: 12px 0 8px;">
            <button type="button" class="action-btn" id="newGameBtn" onclick="startNewGame()"
                    style="min-width: 220px; padding: 14px 24px; font-size: 1.15rem;">Новая игра</button>
        </div>
        <div style="display: flex; justify-content: center; margin: 0 0 24px;">
            <button type="button" class="action-btn" onclick="surrender()"
                    style="width: 180px; padding: 12px; font-size: 1rem; opacity: 0.85;">Сдаться</button>
        </div>

        <!-- ЧАТ как в лобби -->
        <div class="chat-section" style="margin-top: 30px;">
            <h2>Чат</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" 
                       placeholder="Введите сообщение..." onkeypress="checkEnter(event)">
                <button class="chat-send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <style>
        /* Стили для шапки с линиями на всю ширину */
        .header-with-lines {
            position: relative;
            padding: 15px 0;
            border-top: 2px solid transparent;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            border-image-slice: 1;
            width: 100%;
        }
        
        /* Стили для игрового поля 9x9 (вытянутое вниз) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(var(--xo-n, 9), 60px);
            grid-template-rows: repeat(var(--xo-n, 9), 60px);
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: fit-content;
            height: fit-content;
        }
        
        .game-cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #764ba2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        
        .game-cell:hover {
            background: #667eea;
            transform: scale(1.05);
            border-color: white;
            box-shadow: 0 0 15px #667eea;
        }
        
        .game-cell.x {
            color: #ff6b6b;
        }
        
        .game-cell.o {
            color: #4ecdc4;
        }
        
        /* Стили для кнопок действий (одинаковые) */
        .action-btn {
            background: rgba(102, 126, 234, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Адаптивность для телефонов */
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(var(--xo-n, 9), 40px);
                grid-template-rows: repeat(var(--xo-n, 9), 40px);
                gap: 4px;
                padding: 12px;
            }
            
            .game-cell {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            
            .action-btn {
                width: 140px !important;
                padding: 12px !important;
                font-size: 1rem !important;
            }
        }
        
        @media (max-width: 480px) {
            .game-board {
                grid-template-columns: repeat(var(--xo-n, 9), 32px);
                grid-template-rows: repeat(var(--xo-n, 9), 32px);
                gap: 3px;
                padding: 10px;
            }
            
            .game-cell {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }
    </style>

    <script>
        const roomCode = "{{ room_code }}".trim().toUpperCase();
        const playerName = (() => {
            let n = sessionStorage.getItem('playerName');
            if (n && String(n).trim()) return String(n).trim().slice(0, 20);
            n = localStorage.getItem('playerName');
            if (n && String(n).trim()) {
                const t = String(n).trim().slice(0, 20);
                sessionStorage.setItem('playerName', t);
                return t;
            }
            return 'Игрок';
        })();
        /** Ваша роль в партии: p1 (X) или p2 (O); задаётся сервером по sid, не путать с текущим ходом */
        let myPlayerId = null;
        let gameOver = false;
        let lastResultBannerKey = null;
        let boardSize = 9;
        
        const socket = io();
        
        socket.on('connect', () => {
            socket.emit('join_room', { room_code: roomCode, name: playerName });
            loadGameState();
        });
        
        function loadGameState() {
            const sid = socket.id || '';
            fetch(`/api/game_state/${roomCode}?sid=${encodeURIComponent(sid)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) return;
                    updateGameDisplay(data);
                });
        }
        
        function applyPlayerNamesFromState(data) {
            if (data.xo_players && data.xo_players.length >= 2) {
                const x = data.xo_players.find(p => p.id === 'p1');
                const o = data.xo_players.find(p => p.id === 'p2');
                if (x) document.getElementById('playerXName').textContent = x.name;
                if (o) document.getElementById('playerOName').textContent = o.name;
            }
        }
        
        function updateGameDisplay(data) {
            boardSize = data.board_size || 9;
            document.getElementById('gameBoard').style.setProperty('--xo-n', String(boardSize));
            
            renderBoard(data.board, boardSize);
            applyPlayerNamesFromState(data);
            
            if (data.your_player_id === 'p1' || data.your_player_id === 'p2') {
                myPlayerId = data.your_player_id;
            }
            
            document.getElementById('turnIndicator').innerHTML = `Ход: ${data.current_player.symbol}`;
            document.getElementById('movesCounter').innerHTML = `Ходов: ${data.move_count || 0}`;
            
            if (data.current_player.id === 'p1') {
                document.getElementById('playerXCard').classList.add('active');
                document.getElementById('playerOCard').classList.remove('active');
                document.getElementById('playerXStatus').innerHTML = '⚡ ходит';
                document.getElementById('playerOStatus').innerHTML = '⏳ ждет';
            } else {
                document.getElementById('playerXCard').classList.remove('active');
                document.getElementById('playerOCard').classList.add('active');
                document.getElementById('playerXStatus').innerHTML = '⏳ ждет';
                document.getElementById('playerOStatus').innerHTML = '⚡ ходит';
            }
            
            gameOver = data.game_over;
            
            if (data.game_over) {
                const key = data.is_draw ? 'draw' : (data.winner ? `win:${data.winner.id}` : 'over');
                if (key !== lastResultBannerKey) {
                    lastResultBannerKey = key;
                    alert(data.winner ? `Победил: ${data.winner.name}` : 'Ничья!');
                }
            } else {
                lastResultBannerKey = null;
            }
        }
        
        function renderBoard(board, n) {
            const boardDiv = document.getElementById('gameBoard');
            boardDiv.innerHTML = '';
            
            for (let row = 0; row < n; row++) {
                for (let col = 0; col < n; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'game-cell';
                    
                    const value = board[row][col];
                    if (value === 'X') {
                        cell.classList.add('x');
                        cell.textContent = 'X';
                    } else if (value === 'O') {
                        cell.classList.add('o');
                        cell.textContent = 'O';
                    } else {
                        cell.textContent = '·';
                    }
                    
                    cell.onclick = () => makeMove(row, col);
                    boardDiv.appendChild(cell);
                }
            }
        }
        
        function makeMove(row, col) {
            if (gameOver) {
                alert('Игра уже закончена');
                return;
            }
            if (!myPlayerId) {
                alert('Вы не в списке участников партии (нужны первые два игрока в комнате)');
                return;
            }
            const sid = socket.id;
            if (!sid) {
                alert('Нет соединения с сервером');
                return;
            }
            
            fetch('/api/make_move', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    room_code: roomCode,
                    player_id: myPlayerId,
                    row: row,
                    col: col,
                    sid: sid
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.game_state) {
                        updateGameDisplay(data.game_state);
                    } else {
                        loadGameState();
                    }
                } else {
                    alert(data.message);
                }
            });
        }
        
        function startNewGame() {
            if (!confirm('Начать новую игру? Текущая партия будет сброшена.')) return;
            const sid = socket.id;
            if (!sid) {
                alert('Нет соединения с сервером');
                return;
            }
            fetch(`/api/new_game/${roomCode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ sid: sid })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.game_state) {
                    lastResultBannerKey = null;
                    updateGameDisplay(data.game_state);
                } else {
                    alert(data.message || 'Не удалось начать новую игру');
                }
            })
            .catch(() => alert('Ошибка сети'));
        }
        
        function surrender() {
            alert('Функция «сдаться» будет добавлена позже');
        }
        
        // Функции чата
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                socket.emit('send_message', {
                    room_code: roomCode,
                    message: message
                });
                input.value = '';
            }
        }
        
        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        socket.on('new_message', (data) => {
            const chatMessages = document.getElementById('chatMessages');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            chatMessages.innerHTML += `
                <div class="chat-message">
                    <span class="message-sender">${data.sender}</span>
                    <span class="message-time">${timeStr}</span>
                    <div>${data.message}</div>
                </div>
            `;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
        
        socket.on('players_update', () => {
            loadGameState();
        });
        
        socket.on('xo_state_refresh', () => {
            lastResultBannerKey = null;
            loadGameState();
        });
        
        setInterval(() => {
            if (socket.connected) loadGameState();
        }, 2000);
    </script>
</body>
</html>
