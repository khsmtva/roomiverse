<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOMIVERSE - Крестики-нолики 9x9</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>

    <!-- Линия сверху (на всю ширину страницы) -->
    <div class="top-line"></div>

    <div class="container">
        <!-- Шапка с линиями на всю ширину как в лобби -->
        <div style="width: 100%; margin-bottom: 20px;">
            <div class="header-with-lines" style="width: 100%;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h1 class="logo" style="margin: 0;">ROOMIVERSE</h1>
                    <a href="/lobby?code={{ room_code }}" class="back-to-lobby" 
                       style="color: #667eea; text-decoration: none; padding: 10px 20px; 
                              background: rgba(102, 126, 234, 0.2); border-radius: 10px;">
                        ← В лобби
                    </a>
                </div>
            </div>
        </div>

        <!-- Статус игроков (как в лобби) -->
        <div style="display: flex; justify-content: center; align-items: center; gap: 30px; margin: 30px 0;">
            <div class="player-card" id="playerXCard" style="min-width: 150px;">
                <div class="player-avatar" style="background: #ff6b6b;">X</div>
                <div>
                    <div class="player-name" id="playerXName">Загрузка...</div>
                    <div style="color: #ff6b6b;" id="playerXStatus">⚡ ходит</div>
                </div>
            </div>
            
            <div style="font-size: 24px; color: #667eea; font-weight: bold;">VS</div>
            
            <div class="player-card" id="playerOCard" style="min-width: 150px;">
                <div class="player-avatar" style="background: #4ecdc4;">O</div>
                <div>
                    <div class="player-name" id="playerOName">Загрузка...</div>
                    <div style="color: #4ecdc4;" id="playerOStatus">⏳ ждет</div>
                </div>
            </div>
        </div>

        <!-- Статистика игры -->
        <div style="display: flex; justify-content: space-between; margin: 20px 0; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px;">
            <span style="color: #667eea;" id="turnIndicator">Ход: X</span>
            <span style="color: #764ba2;" id="movesCounter">0 ходов</span>
        </div>

        <!-- ИГРОВОЕ ПОЛЕ 9x9 по центру (вытянутое вниз) -->
        <div style="display: flex; justify-content: center; margin: 20px 0;">
            <div class="game-board" id="gameBoard"></div>
        </div>

        <!-- Кнопки действий (одинакового размера по центру) -->
        <div style="display: flex; gap: 20px; justify-content: center; margin: 30px 0;">
            <button class="action-btn" onclick="restartGame()" style="width: 180px; padding: 15px; font-size: 1.2rem;">🔄 Новая игра</button>
            <button class="action-btn" onclick="surrender()" style="width: 180px; padding: 15px; font-size: 1.2rem;">🏳️ Сдаться</button>
        </div>

        <!-- ЧАТ как в лобби -->
        <div class="chat-section" style="margin-top: 30px;">
            <h2>Чат</h2>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" 
                       placeholder="Введите сообщение..." onkeypress="checkEnter(event)">
                <button class="chat-send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <style>
        /* Стили для шапки с линиями на всю ширину */
        .header-with-lines {
            position: relative;
            padding: 15px 0;
            border-top: 2px solid transparent;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            border-image-slice: 1;
            width: 100%;
        }
        
        /* Стили для игрового поля 9x9 (вытянутое вниз) */
        .game-board {
            display: grid;
            grid-template-columns: repeat(9, 60px);
            grid-template-rows: repeat(9, 60px);
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            width: fit-content;
            height: fit-content;
        }
        
        .game-cell {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #764ba2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        
        .game-cell:hover {
            background: #667eea;
            transform: scale(1.05);
            border-color: white;
            box-shadow: 0 0 15px #667eea;
        }
        
        .game-cell.x {
            color: #ff6b6b;
        }
        
        .game-cell.o {
            color: #4ecdc4;
        }
        
        /* Стили для кнопок действий (одинаковые) */
        .action-btn {
            background: rgba(102, 126, 234, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        .action-btn:hover {
            background: rgba(102, 126, 234, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        /* Адаптивность для телефонов */
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(9, 40px);
                grid-template-rows: repeat(9, 40px);
                gap: 4px;
                padding: 12px;
            }
            
            .game-cell {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            
            .action-btn {
                width: 140px !important;
                padding: 12px !important;
                font-size: 1rem !important;
            }
        }
        
        @media (max-width: 480px) {
            .game-board {
                grid-template-columns: repeat(9, 32px);
                grid-template-rows: repeat(9, 32px);
                gap: 3px;
                padding: 10px;
            }
            
            .game-cell {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }
    </style>

    <script>
        const roomCode = "{{ room_code }}";
        const playerName = localStorage.getItem('playerName') || 'Игрок';
        let currentPlayerId = 'p1';
        let gameOver = false;
        
        const socket = io();
        
        socket.emit('join_room', {
            room_code: roomCode,
            name: playerName
        });
        
        function loadGameState() {
            fetch(`/api/game_state/${roomCode}`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) return;
                    updateGameDisplay(data);
                });
        }
        
        function updateGameDisplay(data) {
            renderBoard(data.board);
            
            document.getElementById('turnIndicator').innerHTML = `Ход: ${data.current_player.symbol}`;
            document.getElementById('movesCounter').innerHTML = `Ходов: ${data.move_count || 0}`;
            
            if (data.current_player.id === 'p1') {
                document.getElementById('playerXCard').classList.add('active');
                document.getElementById('playerOCard').classList.remove('active');
                document.getElementById('playerXStatus').innerHTML = '⚡ ходит';
                document.getElementById('playerOStatus').innerHTML = '⏳ ждет';
            } else {
                document.getElementById('playerXCard').classList.remove('active');
                document.getElementById('playerOCard').classList.add('active');
                document.getElementById('playerXStatus').innerHTML = '⏳ ждет';
                document.getElementById('playerOStatus').innerHTML = '⚡ ходит';
            }
            
            currentPlayerId = data.current_player.id;
            gameOver = data.game_over;
            
            if (data.game_over) {
                alert(data.winner ? `🏆 Победил: ${data.winner.name}` : '🤝 Ничья!');
            }
        }
        
        function renderBoard(board) {
            const boardDiv = document.getElementById('gameBoard');
            boardDiv.innerHTML = '';
            
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'game-cell';
                    
                    const value = board[row][col];
                    if (value === 'X') {
                        cell.classList.add('x');
                        cell.textContent = 'X';
                    } else if (value === 'O') {
                        cell.classList.add('o');
                        cell.textContent = 'O';
                    } else {
                        cell.textContent = '·';
                    }
                    
                    cell.onclick = () => makeMove(row, col);
                    boardDiv.appendChild(cell);
                }
            }
        }
        
        function makeMove(row, col) {
            if (gameOver) {
                alert('Игра уже закончена!');
                return;
            }
            
            fetch('/api/make_move', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    room_code: roomCode,
                    player_id: currentPlayerId,
                    row: row,
                    col: col
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadGameState();
                } else {
                    alert(data.message);
                }
            });
        }
        
        function restartGame() {
            if (confirm('Начать новую игру?')) {
                location.reload();
            }
        }
        
        function surrender() {
            alert('Функция "сдаться" будет добавлена позже');
        }
        
        // Функции чата
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                socket.emit('send_message', {
                    room_code: roomCode,
                    message: message
                });
                input.value = '';
            }
        }
        
        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        socket.on('new_message', (data) => {
            const chatMessages = document.getElementById('chatMessages');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            chatMessages.innerHTML += `
                <div class="chat-message">
                    <span class="message-sender">${data.sender}</span>
                    <span class="message-time">${timeStr}</span>
                    <div>${data.message}</div>
                </div>
            `;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
        
        socket.on('players_update', (data) => {
            if (data.players && data.players.length >= 2) {
                document.getElementById('playerXName').textContent = data.players[0];
                document.getElementById('playerOName').textContent = data.players[1];
            }
        });
        
        loadGameState();
        setInterval(loadGameState, 2000);
    </script>
</body>
</html>
